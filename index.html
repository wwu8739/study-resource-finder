<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Study Resource Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles/style.css">

</head>

<body class="container mt-4">

<h1>Study Resource Finder</h1>
<p class="lead">Find the best programming and robotics learning resources.</p>

<hr>

<h3>Login</h3>

<input id="password" type="password" placeholder="Enter password" class="form-control mb-2">

<button id="login-btn" class="btn btn-primary">Login</button>

<p id="status"></p>

<hr>

<h3>Search Resources</h3>

<input id="search" class="form-control mb-3" placeholder="Search resources...">

<select id="filter" class="form-select mb-3">
<option value="all">All</option>
<option value="Programming">Programming</option>
<option value="Robotics">Robotics</option>
<option value="Web">Web</option>
</select>

<div id="results" class="row"></div>

<br>

<a href="pages/session.html" class="btn btn-secondary">View Session Data</a>

<script src="scripts/app.js"></script>

</body>
</html>
